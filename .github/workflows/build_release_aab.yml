name: Build Release AAB

on:
  workflow_dispatch: {}
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ANDROID_SDK_ROOT: ${{ runner.temp }}/android-sdk

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install Android command-line tools
        run: |
          mkdir -p "$ANDROID_SDK_ROOT"
          cd "$ANDROID_SDK_ROOT"
          curl -sSfL https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -o cmdline.zip
          unzip -q cmdline.zip -d cmdline
          mkdir -p cmdline-tools/latest
          mv cmdline/cmdline-tools/* cmdline-tools/latest/ || true
          yes | cmdline-tools/latest/bin/sdkmanager --sdk_root="$ANDROID_SDK_ROOT" "platform-tools" "platforms;android-36" "build-tools;36.1.0"
          chmod -R a+rx "$ANDROID_SDK_ROOT"

      - name: Prepare keystore from secret
        env:
          KEY_B64: ${{ secrets.RELEASE_STORE_BASE64 }}
        run: |
          if [ -z "$KEY_B64" ]; then echo 'Missing RELEASE_STORE_BASE64 secret'; exit 1; fi
          mkdir -p android-app
          echo "$KEY_B64" | base64 --decode > android-app/release-keystore.jks
          ls -l android-app/release-keystore.jks

      - name: Grant execute for gradlew
        run: chmod +x ./gradlew

      - name: Build release AAB
        env:
          RELEASE_STORE_FILE: android-app/release-keystore.jks
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
          PATH: ${{ env.ANDROID_SDK_ROOT }}/platform-tools:${{ env.PATH }}
        run: |
          ./gradlew bundleRelease -PRELEASE_STORE_FILE=android-app/release-keystore.jks -PRELEASE_STORE_PASSWORD="$RELEASE_STORE_PASSWORD" -PRELEASE_KEY_ALIAS="$RELEASE_KEY_ALIAS" -PRELEASE_KEY_PASSWORD="$RELEASE_KEY_PASSWORD"

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release.aab
          path: android-app/app/build/outputs/bundle/release/app-release.aab
